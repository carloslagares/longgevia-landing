<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<link rel="stylesheet" href="_base.css">
<style>
  body,.ad{width:1200px;height:628px}
  .ad{display:flex}
  .left{width:58%;padding:54px 50px;display:flex;flex-direction:column}
  .left .logo{font-size:28px} .left .logo .mk{width:40px;height:40px} .left .logo .mk svg{width:24px;height:24px}
  .left .eyebrow{font-size:14px;margin:30px 0 14px}
  h1{font-size:54px;margin-bottom:18px}
  .sub{font-size:21px;line-height:1.4;max-width:95%}
  .bottom{margin-top:auto}
  .pill{font-size:16px;padding:11px 20px;margin-bottom:18px}
  .row{display:flex;align-items:center;gap:20px}
  .cta{font-size:19px;padding:16px 28px}
  .price{font-family:var(--serif);font-size:24px;color:var(--green)} .price small{font-size:15px;color:var(--muted)}
  .right{width:42%;position:relative;overflow:hidden;background:var(--cream2)}
  .right img{width:100%;height:100%;object-fit:cover}
  .right .arch{inset:auto -40px -40px -40px;height:55%;opacity:.5}
</style></head><body>
<div class="ad">
  <div class="left">
    <div class="logo"><span class="mk"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M7 7c3 0 3 5 5 5s2-5 5-5"/><path d="M7 17c3 0 3-5 5-5"/></svg></span>Longgevia</div>
    <span class="eyebrow">Recuperación · Movilidad · Longevidad</span>
    <h1>Recupérate hoy.<br>Vive fuerte <em>mañana.</em></h1>
    <p class="sub">Fórmulas diarias de soporte nutricional para una vida activa. Cápsulas, no viales.</p>
    <div class="bottom">
      <span class="pill">★ Suscripción flexible · envío gratis el primer mes</span>
      <div class="row">
        <span class="cta">Empieza en longgevia.com →</span>
        <span class="price">desde 39 €<small>/mes</small></span>
      </div>
    </div>
  </div>
  <div class="right">
    <img src="../assets/life_labeled.png" alt="">
  </div>
</div>
</body></html>
