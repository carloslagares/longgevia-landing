<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<link rel="stylesheet" href="_base.css">
<style>
  body,.ad{width:1080px;height:1080px}
  .ad{padding:70px 70px 64px;display:flex;flex-direction:column}
  .top{display:flex;justify-content:space-between;align-items:center}
  .logo{font-size:34px} .logo .mk{width:46px;height:46px} .logo .mk svg{width:27px;height:27px}
  .top .eyebrow{font-size:16px}
  .mid{flex:1;display:flex;align-items:center;gap:48px;margin-top:30px}
  .copy{width:46%}
  .copy .eyebrow{font-size:17px}
  h1{font-size:74px;margin:18px 0 22px}
  .sub{font-size:25px;line-height:1.4}
  .frame{width:54%;height:560px}
  .arch{inset:-30px -30px auto -30px;height:62%}
  .tag{left:-26px;bottom:54px;padding:16px 20px}
  .tag .sw{width:46px;height:46px;font-size:22px} .tag b{font-size:21px} .tag span{font-size:14px}
  .bottom{display:flex;align-items:center;justify-content:space-between;margin-top:34px}
  .offer{display:flex;align-items:center;gap:18px}
  .pill{font-size:20px;padding:14px 24px}
  .cta{font-size:23px;padding:20px 36px}
  .price{font-family:var(--serif);font-size:30px;color:var(--green)} .price small{font-size:18px;color:var(--muted)}
</style></head><body>
<div class="ad">
  <div class="top">
    <div class="logo"><span class="mk"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M7 7c3 0 3 5 5 5s2-5 5-5"/><path d="M7 17c3 0 3-5 5-5"/></svg></span>Longgevia</div>
    <span class="eyebrow">Recuperación · Longevidad</span>
  </div>
  <div class="mid">
    <div class="copy">
      <span class="eyebrow">Nuevo en Europa</span>
      <h1>Recupérate hoy.<br>Vive fuerte <em>mañana.</em></h1>
      <p class="sub">Tu rutina diaria de recuperación. Una cápsula. Sin viales.</p>
    </div>
    <div class="frame" style="position:relative">
      <div class="arch"></div>
      <div class="frame" style="width:100%;height:100%;box-shadow:none;border-radius:34px"><img src="../assets/lab_recovery.png" alt=""></div>
      <div class="tag"><span class="sw">L</span><div><b>Longgevia Recovery</b><span>30 cápsulas · fórmula diaria</span></div></div>
    </div>
  </div>
  <div class="bottom">
    <div class="offer">
      <span class="pill">★ Suscripción · envío gratis 1er mes</span>
      <span class="price">desde 39 €<small>/mes</small></span>
    </div>
    <span class="cta">Empieza en longgevia.com →</span>
  </div>
</div>
</body></html>
