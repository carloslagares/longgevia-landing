<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<link rel="stylesheet" href="_base.css">
<style>
  body,.ad{width:1080px;height:1920px}
  .ad{display:flex;flex-direction:column}
  .imgwrap{height:1080px;position:relative;overflow:hidden}
  .imgwrap img{width:100%;height:100%;object-fit:cover}
  .imgwrap .grad{position:absolute;inset:0;background:linear-gradient(180deg,rgba(27,58,47,.28),transparent 30%,transparent 62%,var(--cream))}
  .imgwrap .logo{position:absolute;top:60px;left:64px;font-size:38px;color:var(--cream)}
  .imgwrap .logo .mk{width:50px;height:50px;background:rgba(245,241,232,.18)} .imgwrap .logo .mk svg{width:30px;height:30px;stroke:var(--cream)}
  .panel{flex:1;padding:20px 70px 80px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
  .panel .eyebrow{font-size:22px;margin-bottom:18px}
  h1{font-size:96px} h1 em{display:block}
  .sub{font-size:30px;margin:28px 0 0;max-width:760px;line-height:1.4}
  .offerbox{margin-top:auto;width:100%}
  .pill{font-size:26px;padding:18px 30px;margin-bottom:26px}
  .cta{font-size:34px;padding:28px 0;width:100%;justify-content:center;border-radius:24px}
  .url{display:block;margin-top:22px;font-size:26px}
</style></head><body>
<div class="ad">
  <div class="imgwrap">
    <img src="../assets/lab_recovery.png" alt="">
    <div class="grad"></div>
    <div class="logo"><span class="mk"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M7 7c3 0 3 5 5 5s2-5 5-5"/><path d="M7 17c3 0 3-5 5-5"/></svg></span>Longgevia</div>
  </div>
  <div class="panel">
    <span class="eyebrow">Recuperación · Longevidad</span>
    <h1>Tu rutina<em><span style="color:var(--orange)">empieza hoy</span></em></h1>
    <p class="sub">Recuperación diaria de soporte nutricional. Una cápsula. Sin viales, sin teatro.</p>
    <div class="offerbox">
      <span class="pill">★ Suscripción · envío gratis el 1er mes · desde 39 €/mes</span>
      <span class="cta">Desliza hacia arriba →</span>
      <span class="url">longgevia.com</span>
    </div>
  </div>
</div>
</body></html>
