<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<link rel="stylesheet" href="_base.css">
<style>
  body,.ad{width:1600px;height:900px}
  .ad{display:flex;align-items:center;gap:60px;padding:80px 90px}
  .copy{width:52%}
  .copy .logo{font-size:34px} .copy .logo .mk{width:46px;height:46px} .copy .logo .mk svg{width:27px;height:27px}
  .copy .eyebrow{font-size:17px;margin:36px 0 18px}
  h1{font-size:84px;margin-bottom:26px}
  .sub{font-size:27px;line-height:1.4;max-width:92%}
  .bottom{margin-top:42px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
  .pill{font-size:19px;padding:14px 24px}
  .cta{font-size:23px;padding:20px 34px}
  .price{font-family:var(--serif);font-size:30px;color:var(--green)} .price small{font-size:18px;color:var(--muted)}
  .visual{width:48%;position:relative;display:flex;justify-content:center}
  .frame{width:520px;height:640px}
  .arch{inset:-32px -32px auto -32px;height:60%}
  .tag{left:-10px;bottom:60px;padding:18px 22px}
  .tag .sw{width:48px;height:48px;font-size:23px} .tag b{font-size:22px} .tag span{font-size:15px}
</style></head><body>
<div class="ad">
  <div class="copy">
    <div class="logo"><span class="mk"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M7 7c3 0 3 5 5 5s2-5 5-5"/><path d="M7 17c3 0 3-5 5-5"/></svg></span>Longgevia</div>
    <span class="eyebrow">Nuevo · Recuperación y longevidad</span>
    <h1>Recupérate hoy.<br>Vive fuerte <em>mañana.</em></h1>
    <p class="sub">Tu rutina diaria de soporte nutricional. Una cápsula al día, sin viales ni teatro farmacéutico.</p>
    <div class="bottom">
      <span class="pill">★ Suscripción · envío gratis 1er mes</span>
      <span class="price">desde 39 €<small>/mes</small></span>
      <span class="cta">longgevia.com →</span>
    </div>
  </div>
  <div class="visual">
    <div class="arch" style="width:520px"></div>
    <div class="frame"><img src="../assets/lab_recovery.png" alt=""></div>
    <div class="tag"><span class="sw">L</span><div><b>Longgevia Recovery</b><span>30 cápsulas · fórmula diaria</span></div></div>
  </div>
</div>
</body></html>
